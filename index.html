<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grizzlys Trainingsplaner</title>
<style>
  :root{
    --ground:#F2F3EE;
    --panel:#FFFFFF;
    --ink:#1E2320;
    --ink-soft:#5B6058;
    --line:#DBDCCF;
    --accent:#D9622B;
    --accent-ink:#7A2E0C;
    --forest:#3F6B4A;
    --forest-ink:#1F3A27;
    --slate:#2B4A66;
    --slate-ink:#16283A;
    --amber-tint:#FBE9DD;
    --forest-tint:#E1EBE2;
    --slate-tint:#DFE7ED;
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ground);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:28px 18px 60px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }
  .eyebrow{
    font-size:11px;
    font-weight:800;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--forest-ink);
  }
  h1{
    font-size:26px;
    font-weight:800;
    letter-spacing:-.01em;
    margin:2px 0 0;
    text-wrap:balance;
  }
  .sub{
    font-size:14.5px;
    color:var(--ink-soft);
    margin:0;
    max-width:46ch;
  }

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .field-label{
    font-size:11px;
    font-weight:800;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:8px;
    display:block;
  }
  .chip-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip-btn{
    appearance:none;
    border:1.5px solid var(--line);
    background:var(--panel);
    color:var(--ink);
    font-size:14px;
    font-weight:700;
    padding:9px 16px;
    border-radius:999px;
    cursor:pointer;
    transition:border-color .12s, background .12s, color .12s;
  }
  .chip-btn:hover{border-color:var(--ink-soft);}
  .chip-btn:focus-visible{outline:3px solid var(--slate); outline-offset:2px;}
  .chip-btn.active{
    background:var(--forest);
    border-color:var(--forest);
    color:#fff;
  }
  .chip-btn.active.focus-accent{
    background:var(--accent);
    border-color:var(--accent);
  }

  .go-btn{
    appearance:none;
    border:none;
    background:var(--accent);
    color:#fff;
    font-size:15.5px;
    font-weight:800;
    padding:14px 20px;
    border-radius:11px;
    cursor:pointer;
    letter-spacing:.01em;
  }
  .go-btn:disabled{
    background:#C9C7B8;
    cursor:not-allowed;
  }
  .go-btn:not(:disabled):hover{background:#C1541F;}
  .go-btn:focus-visible{outline:3px solid var(--slate-ink); outline-offset:2px;}

  .plan-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
  }
  .plan-head h2{
    font-size:18px;
    margin:0;
    font-weight:800;
  }
  .plan-total{
    font-size:13px;
    font-weight:700;
    color:var(--ink-soft);
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }

  .block{
    background:var(--panel);
    border:1px solid var(--line);
    border-left:5px solid var(--forest);
    border-radius:10px;
    padding:14px 16px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .block.k-schwerpunkt{border-left-color:var(--accent);}
  .block.k-spielen{border-left-color:var(--slate);}
  .block.k-match{border-left-color:var(--ink);}

  .block-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .block-tags{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    align-items:center;
  }
  .tag{
    font-size:10.5px;
    font-weight:800;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:3px 8px;
    border-radius:6px;
    background:var(--forest-tint);
    color:var(--forest-ink);
  }
  .tag.t-accent{background:var(--amber-tint); color:var(--accent-ink);}
  .tag.t-slate{background:var(--slate-tint); color:var(--slate-ink);}
  .tag.t-dur{background:#EEEDE3; color:var(--ink-soft);}

  .reroll{
    appearance:none;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--ink-soft);
    font-size:12px;
    font-weight:700;
    padding:5px 9px;
    border-radius:8px;
    cursor:pointer;
    flex:none;
  }
  .reroll:hover{border-color:var(--ink-soft); color:var(--ink);}

  .block h3{
    font-size:16px;
    margin:2px 0 0;
    font-weight:800;
  }
  .block p{
    margin:0;
    font-size:14px;
    line-height:1.45;
    color:var(--ink);
  }
  .block .meta{
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.5;
  }
  .block .meta b{color:var(--ink);}

  .block-body{
    display:flex;
    align-items:flex-start;
    gap:12px;
  }
  .block-text{
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .block-thumb{
    position:relative;
    flex:none;
    width:104px;
    aspect-ratio:16/9;
    border-radius:8px;
    overflow:hidden;
    background:var(--line);
    display:block;
  }
  .block-thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .block-thumb .play-badge{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(20,20,16,.28);
    color:#fff;
    font-size:18px;
  }
  .block-thumb:hover .play-badge{background:rgba(20,20,16,.45);}

  .actions-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .ghost-btn{
    appearance:none;
    border:1.5px solid var(--line);
    background:var(--panel);
    color:var(--ink);
    font-size:13.5px;
    font-weight:700;
    padding:10px 14px;
    border-radius:9px;
    cursor:pointer;
  }
  .ghost-btn:hover{border-color:var(--ink-soft);}
  .whatsapp-btn{
    background:#25D366;
    border-color:#25D366;
    color:#0b3d1f;
  }
  .whatsapp-btn:hover{background:#1fbd5a; border-color:#1fbd5a;}

  .hint{
    font-size:12px;
    color:var(--ink-soft);
    line-height:1.5;
    border-top:1px solid var(--line);
    padding-top:14px;
  }

  @media print{
    .panel, .actions-row, .hint{display:none;}
    body{background:#fff;}
  }
</style>

<div class="wrap">
  <div>
    <h1>Trainingsplan-Generator</h1>
  </div>

  <div class="panel">
    <div>
      <span class="field-label">1. Trainingsstufe</span>
      <div class="chip-row" id="levelRow"></div>
    </div>
    <div>
      <span class="field-label">2. Schwerpunkt</span>
      <div class="chip-row" id="focusRow"></div>
    </div>
    <button class="go-btn" id="goBtn" disabled>Trainingsplan erstellen</button>
  </div>

  <div id="planArea"></div>
</div>

  function idx(l){return LEVELS.indexOf(l);}
  function pool(cat, level){
    return EXERCISES[cat].filter(function(e){return idx(e.l) <= idx(level);});
  }
  function pick(list, exclude){
    var options = exclude ? list.filter(function(e){return e !== exclude;}) : list.slice();
    if(!options.length) options = list;
    return options[Math.floor(Math.random()*options.length)];
  }
  function pickTwoDistinct(list){
    var a = pick(list);
    var rest = list.filter(function(e){return e !== a;});
    var b = pick(rest.length ? rest : list, a);
    return [a,b];
  }

  var levelRow = document.getElementById("levelRow");
  var focusRow = document.getElementById("focusRow");
  var goBtn = document.getElementById("goBtn");
  var planArea = document.getElementById("planArea");

  LEVELS.forEach(function(l){
    var b = document.createElement("button");
    b.className = "chip-btn";
    b.textContent = l;
    b.onclick = function(){
      state.level = l;
      Array.prototype.forEach.call(levelRow.children, function(c){c.classList.remove("active");});
      b.classList.add("active");
      updateGoBtn();
    };
    levelRow.appendChild(b);
  });

  Object.keys(FOCUS_META).forEach(function(f){
    var b = document.createElement("button");
    b.className = "chip-btn";
    b.textContent = FOCUS_META[f].label;
    b.onclick = function(){
      state.focus = f;
      Array.prototype.forEach.call(focusRow.children, function(c){c.classList.remove("active","focus-accent");});
      b.classList.add("active","focus-accent");
      updateGoBtn();
    };
    focusRow.appendChild(b);
  });

  function updateGoBtn(){
    goBtn.disabled = !(state.level && state.focus);
  }

  function buildPlan(){
    var warm = pick(pool("warmup", state.level));
    var pair = pickTwoDistinct(pool(state.focus, state.level));
    var play = pick(pool("spielen", state.level));
    state.plan = {warm:warm, focus:pair, play:play};
    renderPlan();
  }

  function rerollSlot(kind, idx2){
    if(kind === "warm"){
      state.plan.warm = pick(pool("warmup", state.level), state.plan.warm);
    } else if(kind === "focus"){
      var others = state.plan.focus.filter(function(_,i){return i!==idx2;});
      var full = pool(state.focus, state.level).filter(function(e){return others.indexOf(e)===-1;});
      state.plan.focus[idx2] = pick(full.length?full:pool(state.focus,state.level), state.plan.focus[idx2]);
    } else if(kind === "play"){
      state.plan.play = pick(pool("spielen", state.level), state.plan.play);
    }
    renderPlan();
  }

  function metaLine(ex){
    var parts = [];
    if(ex.m) parts.push("<b>Material:</b> " + ex.m);
    if(ex.v) parts.push("<b>Variation:</b> " + ex.v);
    return parts.join(" &nbsp;&middot;&nbsp; ");
  }

  function blockHtml(kindClass, tagText, tagClass, durText, levelText, ex, onReroll){
    var div = document.createElement("div");
    div.className = "block " + kindClass;
    div.innerHTML =
      '<div class="block-top">' +
        '<div class="block-tags">' +
          '<span class="tag ' + tagClass + '">' + tagText + '</span>' +
          '<span class="tag t-dur">' + durText + '</span>' +
          '<span class="tag">' + levelLabel[ex.l] + '</span>' +
        '</div>' +
        '<button class="reroll" type="button">&#8635; andere</button>' +
      '</div>' +
      '<div class="block-body">' +
        '<div class="block-text">' +
          '<h3>' + ex.t + '</h3>' +
          '<p>' + ex.d + '</p>' +
          '<div class="meta">' + metaLine(ex) + '</div>' +
        '</div>' +
        (ex.y ?
          '<a class="block-thumb" href="https://youtu.be/' + ex.y + '" target="_blank" rel="noopener" aria-label="Video ansehen: ' + ex.t + '">' +
            '<img src="https://img.youtube.com/vi/' + ex.y + '/mqdefault.jpg" alt="" loading="lazy">' +
            '<span class="play-badge">&#9654;</span>' +
          '</a>'
        : '') +
      '</div>';
    div.querySelector(".reroll").onclick = onReroll;
    return div;
  }

  function renderPlan(){
    planArea.innerHTML = "";
    if(!state.plan) return;

    var head = document.createElement("div");
    head.className = "plan-head";
    head.innerHTML = '<h2>Trainingsplan &middot; ' + state.level + ' &middot; ' + FOCUS_META[state.focus].label + '</h2><span class="plan-total">&asymp; 85 Min. total</span>';
    planArea.appendChild(head);

    planArea.appendChild(blockHtml("k-warmup","Warmup","", "10 Min.", "", state.plan.warm, function(){rerollSlot("warm");}));
    planArea.appendChild(blockHtml("k-schwerpunkt", FOCUS_META[state.focus].label + " 1", "t-accent", "15 Min.", "", state.plan.focus[0], function(){rerollSlot("focus",0);}));
    planArea.appendChild(blockHtml("k-schwerpunkt", FOCUS_META[state.focus].label + " 2", "t-accent", "15 Min.", "", state.plan.focus[1], function(){rerollSlot("focus",1);}));
    planArea.appendChild(blockHtml("k-spielen","Spielen","t-slate", "15 Min.", "", state.plan.play, function(){rerollSlot("play");}));

    var match = document.createElement("div");
    match.className = "block k-match";
    match.innerHTML =
      '<div class="block-top"><div class="block-tags"><span class="tag" style="background:#EAEAE2;color:var(--ink)">Mätschle</span><span class="tag t-dur">30 Min.</span></div></div>' +
      '<h3>Freies Spiel</h3><p>Zum Abschluss 30 Minuten Mätschle in gemischten Teams.</p>';
    planArea.appendChild(match);

    var actions = document.createElement("div");
    actions.className = "actions-row";
    actions.innerHTML = '<button class="ghost-btn" id="reshuffleBtn">&#8635; Ganzen Plan neu mischen</button><button class="ghost-btn" id="printBtn">Drucken</button><button class="ghost-btn whatsapp-btn" id="waBtn">&#128242; Per WhatsApp teilen</button>';
    planArea.appendChild(actions);
    document.getElementById("reshuffleBtn").onclick = buildPlan;
    document.getElementById("printBtn").onclick = function(){window.print();};
    document.getElementById("waBtn").onclick = function(){
      window.open("https://wa.me/?text=" + encodeURIComponent(planToText()), "_blank");
    };
  }

  function exerciseToText(prefix, ex){
    var lines = [prefix + " " + ex.t + " (" + levelLabel[ex.l] + ")"];
    lines.push(ex.d);
    var meta = [];
    if(ex.m) meta.push("Material: " + ex.m);
    if(ex.v) meta.push("Variation: " + ex.v);
    if(meta.length) lines.push(meta.join(" / "));
    if(ex.y) lines.push("Video: https://youtu.be/" + ex.y);
    return lines.join("\n");
  }

  function planToText(){
    var p = state.plan;
    var lines = [
      "🏒 Grizzlys Trainingsplan – " + state.level + " · " + FOCUS_META[state.focus].label + " (≈ 85 Min.)",
      "",
      exerciseToText("1️⃣ Warmup (10 Min.)", p.warm),
      "",
      exerciseToText("2️⃣ " + FOCUS_META[state.focus].label + " 1 (15 Min.)", p.focus[0]),
      "",
      exerciseToText("3️⃣ " + FOCUS_META[state.focus].label + " 2 (15 Min.)", p.focus[1]),
      "",
      exerciseToText("4️⃣ Spielen (15 Min.)", p.play),
      "",
      "5️⃣ Mätschle (30 Min.)\nFreies Spiel in gemischten Teams."
    ];
    return lines.join("\n");
  }

  goBtn.onclick = buildPlan;
})();
</script>
